<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>書審封面</title>
<style>
  :root {
    --accent: #1a5276;
    --accent-light: #2980b9;
    --accent-bg: #eaf2f8;
    --page-bg: #F9F9F9;
    --text-primary: #1c1c1c;
    --text-secondary: #444;
    --text-muted: #666;
    --border: #d5d8dc;
    --page-margin: 1cm;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html {
    font-size: 11pt;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  body {
    font-family: "Times New Roman", "DFKai-SB", "標楷體", "BiauKai", serif;
    color: var(--text-primary);
    background: #d0d0d0;
    line-height: 1.55;
  }

  .page {
    width: 210mm;
    height: 297mm;
    margin: 0 auto;
    background: var(--page-bg);
    padding: var(--page-margin);
    position: relative;
    overflow: hidden;
  }

  .page-cover {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    padding: 3cm 2.5cm 2.5cm;
  }

  .cover-logo {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .cover-logo img {
    width: 100%;
    max-height: 180px;
    object-fit: contain;
    display: block;
  }

  .cover-body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    width: 100%;
  }

  .cover-title {
    font-size: 26pt;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 6px;
    text-align: center;
    line-height: 1.6;
    width: 100%;
  }

  .cover-footer {
    width: 100%;
    text-align: center;
    font-size: 18pt;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: 3px;
    line-height: 2;
  }

  .page-break {
    page-break-before: always;
  }

  @media print {
    html { font-size: 11pt; }
    body { background: none; }

    :root {
      --text-primary:   #000000;
      --text-secondary: #111111;
      --text-muted:     #333333;
    }

    .page {
      margin: 0;
      box-shadow: none;
      width: 100%;
      height: 297mm;
      background: var(--page-bg);
    }

    .page-cover {
      padding: 3cm 2.5cm 2.5cm;
    }

    .page-break {
      page-break-before: always;
    }
  }

  @media screen {
    .page {
      box-shadow: 0 4px 24px rgba(0,0,0,0.18);
      margin-top: 24px;
      margin-bottom: 24px;
    }
  }

  @page {
    size: A4;
    margin: 0;
  }
</style>
</head>
<body>

<!-- ==================== 封面一：國立臺灣科技大學 ==================== -->
<div class="page page-cover">

  <div class="cover-logo">
    <img src="logo/台科大.png" alt="國立臺灣科技大學">
  </div>

  <div class="cover-body">
    <h2 class="cover-title">資訊工程學系<br>書面審查資料</h2>
  </div>

  <h2 class="cover-footer">
    國立臺中科技大學　資訊工程科<br>
    賴家煜
  </h2>
</div>

<!-- ==================== 封面二：國立臺北科技大學 ==================== -->
<div class="page page-break page-cover">

  <div class="cover-logo">
    <img src="logo/北科大png.png" alt="國立臺北科技大學">
  </div>

  <div class="cover-body">
    <h2 class="cover-title">資訊工程學系<br>書面審查資料</h2>
  </div>

  <h2 class="cover-footer">
    國立臺中科技大學　資訊工程科<br>
    賴家煜
  </h2>
</div>

<!-- ==================== 封面三：國立臺中科技大學 ==================== -->
<div class="page page-break page-cover">

  <div class="cover-logo">
    <img src="logo/台中科技大學.gif" alt="國立臺中科技大學">
  </div>

  <div class="cover-body">
    <h2 class="cover-title">資訊工程學系<br>書面審查資料</h2>
  </div>

  <h2 class="cover-footer">
    國立臺中科技大學　資訊工程科<br>
    賴家煜
  </h2>
</div>

<!-- ==================== 封面四：國立雲林科技大學 ==================== -->
<div class="page page-break page-cover">

  <div class="cover-logo">
    <img src="logo/雲科大png.png" alt="國立雲林科技大學">
  </div>

  <div class="cover-body">
    <h2 class="cover-title">資訊管理學系<br>書面審查資料</h2>
  </div>

  <h2 class="cover-footer">
    國立臺中科技大學　資訊工程科<br>
    賴家煜
  </h2>
</div>

</body>
</html>
