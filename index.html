<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Resume Hub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, "Segoe UI", "Noto Sans TC", sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .container {
      background: #fff;
      padding: 3rem 4rem;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      text-align: center;
    }
    h1 { color: #333; margin-bottom: 2rem; font-size: 1.8rem; }
    .links { display: flex; flex-direction: column; gap: 1rem; }
    a {
      display: inline-block;
      padding: 0.9rem 2rem;
      background: #667eea;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: transform 0.2s, background 0.2s;
    }
    a:hover { background: #5568d3; transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="container">
    <h1>My Resume</h1>
    <div class="links">
      <a href="https://htmlpreview.github.io/?https://github.com/ttdragon0722/my-resume/blob/master/cover.html" target="_blank" rel="noopener">
        Cover Letter
      </a>
      <a href="https://htmlpreview.github.io/?https://github.com/ttdragon0722/my-resume/blob/master/resume_1.html" target="_blank" rel="noopener">
        Resume
      </a>
    </div>
  </div>
</body>
</html>
